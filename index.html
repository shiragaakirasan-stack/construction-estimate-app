<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工事見積書作成アプリ</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --ink: #17202a;
      --muted: #64748b;
      --line: #d9e2ec;
      --main: #2563eb;
      --main-dark: #1d4ed8;
      --danger: #dc2626;
      --soft: #eef4ff;
      --success: #16a34a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    header {
      padding: 22px 28px;
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: white;
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 26px;
      letter-spacing: .04em;
    }

    header p {
      margin: 0;
      opacity: .9;
      font-size: 14px;
    }

    main {
      width: min(1560px, 96vw);
      margin: 24px auto 48px;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, .07);
      padding: 18px;
      margin-bottom: 18px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 18px;
      border-left: 5px solid var(--main);
      padding-left: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 5px;
      font-weight: 700;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 11px;
      font-size: 14px;
      background: white;
      color: var(--ink);
    }

    input[type="file"] {
      padding: 8px;
      background: #f8fafc;
    }

    textarea { min-height: 78px; resize: vertical; }

    input:focus, textarea:focus, select:focus {
      outline: 3px solid rgba(37, 99, 235, .16);
      border-color: var(--main);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .top-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 15px;
      font-weight: 800;
      cursor: pointer;
      background: var(--main);
      color: white;
      transition: .16s ease;
      white-space: nowrap;
    }

    button:hover { background: var(--main-dark); transform: translateY(-1px); }
    button.secondary { background: #334155; }
    button.light { background: var(--soft); color: #1e3a8a; }
    button.danger { background: var(--danger); }
    button.success { background: var(--success); }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 14px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px 6px;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      text-align: left;
      background: #f8fafc;
    }

    .table-wrap { overflow-x: auto; }

    .editor-table {
      min-width: 1320px;
    }

    .editor-table input {
      padding: 10px;
      border-radius: 8px;
      font-size: 15px;
    }

    .editor-table textarea {
      min-height: 52px;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
    }

    .editor-table th:nth-child(1), .editor-table td:nth-child(1) { min-width: 150px; }
    .editor-table th:nth-child(2), .editor-table td:nth-child(2) { min-width: 180px; }
    .editor-table th:nth-child(3), .editor-table td:nth-child(3) { min-width: 280px; }
    .editor-table th:nth-child(4), .editor-table td:nth-child(4) { min-width: 230px; }
    .editor-table th:nth-child(5), .editor-table td:nth-child(5) { min-width: 130px; }
    .editor-table th:nth-child(6), .editor-table td:nth-child(6) { min-width: 110px; }
    .editor-table th:nth-child(7), .editor-table td:nth-child(7) { min-width: 170px; }
    .editor-table th:nth-child(8), .editor-table td:nth-child(8) { min-width: 160px; text-align: right; font-weight: 800; white-space: nowrap; }
    .editor-table th:nth-child(9), .editor-table td:nth-child(9) { width: 72px; text-align: center; }

    .summary {
      display: grid;
      gap: 10px;
      margin-top: 12px;
      background: #f8fafc;
      border-radius: 14px;
      padding: 14px;
    }

    .sum-row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      font-size: 15px;
    }

    .sum-row.total {
      border-top: 2px solid var(--line);
      padding-top: 10px;
      font-size: 22px;
      font-weight: 900;
      color: #1e3a8a;
    }

    .seal-editor-box {
      display: grid;
      grid-template-columns: 1fr 130px;
      gap: 12px;
      align-items: end;
    }

    .seal-sample {
      width: 92px;
      height: 92px;
      border: 1px dashed #cbd5e1;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: #f8fafc;
      overflow: hidden;
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
    }

    .seal-sample img {
      max-width: 86px;
      max-height: 86px;
      object-fit: contain;
    }

    .small-muted { color: var(--muted); font-size: 12px; }

    .history-list {
      display: grid;
      gap: 10px;
    }

    .history-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #f8fafc;
    }

    .history-title { font-weight: 900; }
    .history-meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .history-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .hidden-file { display: none; }

    .preview-shell {
      background: #e5e7eb;
      padding: 22px;
      border-radius: 16px;
      overflow-x: auto;
    }

    .preview-page {
      background: white;
      width: 297mm;
      min-height: 210mm;
      margin: 0 auto 22px;
      padding: 12mm;
      border: 1px solid #cbd5e1;
      box-shadow: 0 10px 25px rgba(15, 23, 42, .12);
      position: relative;
    }

    .estimate-title {
      text-align: center;
      font-size: 28px;
      letter-spacing: .25em;
      font-weight: 900;
      margin: 0 0 18px;
    }

    .preview-top {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 14px;
    }

    .client-name {
      font-size: 20px;
      font-weight: 900;
      border-bottom: 2px solid #111827;
      padding-bottom: 8px;
      margin-bottom: 10px;
    }

    .company-box {
      text-align: right;
      line-height: 1.7;
      font-size: 12px;
      position: relative;
      min-height: 126px;
      padding-right: 6px;
    }

    .seal-on-preview {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 70px;
      height: 70px;
      object-fit: contain;
      opacity: .88;
      pointer-events: none;
    }

    .seal-hidden { display: none; }

    .price-box {
      border: 3px solid #111827;
      padding: 10px 14px;
      margin: 14px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 900;
      font-size: 22px;
    }

    .preview-meta {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px 14px;
      font-size: 12px;
      margin-bottom: 14px;
    }

    .preview-page table th,
    .preview-page table td {
      border: 1px solid #cbd5e1;
      padding: 6px;
    }

    .preview-page table th { background: #e2e8f0; color: #0f172a; }
    .preview-detail { white-space: pre-wrap; font-size: 11px; line-height: 1.55; }
    .right { text-align: right; }
    .center { text-align: center; }

    .cover-label {
      margin: 14px 0 8px;
      font-weight: 900;
      border-left: 5px solid #1e3a8a;
      padding-left: 8px;
    }

    .note-box {
      margin-top: 14px;
      border: 1px solid #cbd5e1;
      padding: 10px;
      min-height: 54px;
      white-space: pre-wrap;
      font-size: 12px;
    }

    .page-heading {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      margin-bottom: 10px;
      font-weight: 900;
    }

    .page-heading span:first-child { font-size: 18px; }
    .category-total { color: #1e3a8a; font-size: 16px; }

    @media (max-width: 980px) {
      .grid, .grid.three, .seal-editor-box { grid-template-columns: 1fr; }
      .seal-sample { margin-left: 0; }
    }

    @page {
      size: A4 landscape;
      margin: 10mm;
    }

    @media print {
      header, .no-print, #inputScreen, .top-actions { display: none !important; }
      body { background: white; }
      main { width: 100%; margin: 0; }
      #previewScreen { display: block !important; }
      .preview-shell { background: white; padding: 0; border-radius: 0; overflow: visible; }
      .preview-page {
        width: auto;
        min-height: auto;
        margin: 0;
        padding: 0;
        border: 0;
        box-shadow: none;
        page-break-after: always;
        break-after: page;
      }
      .preview-page:last-child { page-break-after: auto; break-after: auto; }
      .estimate-title { font-size: 26px; margin-bottom: 12px; }
      .preview-top { margin-bottom: 8px; }
      .price-box { font-size: 20px; margin: 10px 0; padding: 9px 12px; }
      .preview-meta { grid-template-columns: repeat(4, 1fr); gap: 6px 12px; margin-bottom: 10px; }
      .preview-page table { font-size: 11px; page-break-inside: auto; }
      .preview-page table th, .preview-page table td { padding: 5px; }
      .preview-page tr { page-break-inside: avoid; page-break-after: auto; }
      .note-box { font-size: 11px; min-height: 44px; margin-top: 10px; }
      .company-box { font-size: 11px; min-height: 110px; }
      .client-name { font-size: 18px; }
      .seal-on-preview { width: 64px; height: 64px; }
    }
  </style>
</head>
<body>
  <header class="no-print">
    <h1>工事見積書作成アプリ</h1>
    <p>入力画面と見積書プレビュー画面を分離。印刷・PDF保存・データ保存まで対応。</p>
  </header>

  <main>
    <section id="inputScreen" class="screen active">
      <div class="top-actions no-print">
        <div>
          <button class="success" onclick="showPreview()">見積書プレビュー画面へ</button>
          <button class="secondary" onclick="saveData()">データ保存</button>
          <button class="secondary" onclick="loadData()">保存データ読込</button>
          <button class="light" onclick="downloadJson()">JSON書き出し</button>
          <button class="light" onclick="document.getElementById('jsonImportInput').click()">JSON読込</button>
          <input id="jsonImportInput" class="hidden-file" type="file" accept="application/json,.json" />
          <button class="danger" onclick="resetData()">入力初期化</button>
        </div>
        <div class="small-muted">入力画面は横幅を広く使えます。PDF保存はプレビュー画面から行います。</div>
      </div>

      <div class="card">
        <h2>保存履歴</h2>
        <div id="historyList" class="history-list"></div>
        <p class="small-muted">最大10件までこのブラウザ内に保存します。履歴から復元して修正できます。</p>
      </div>

      <div class="card">
        <h2>基本情報</h2>
        <div class="grid">
          <div><label>見積番号</label><input id="estimateNo" value="EST-2026-001" /></div>
          <div><label>作成日</label><input id="issueDate" type="date" /></div>
          <div><label>お客様名</label><input id="clientName" value="〇〇 様" /></div>
          <div><label>件名</label><input id="projectName" value="内装改修工事" /></div>
          <div><label>工事場所</label><input id="siteAddress" value="大阪府大阪市〇〇区〇〇" /></div>
          <div><label>有効期限</label><input id="validUntil" value="発行日より30日間" /></div>
          <div><label>工期</label><input id="workPeriod" value="ご契約後、別途ご相談" /></div>
          <div><label>支払条件</label><input id="paymentTerms" value="着手金50％・完了後50％" /></div>
        </div>
      </div>

      <div class="card">
        <h2>自社情報</h2>
        <div class="grid">
          <div><label>会社名・屋号</label><input id="companyName" value="株式会社サンプル工務店" /></div>
          <div><label>担当者</label><input id="staffName" value="山田 太郎" /></div>
          <div><label>電話番号</label><input id="tel" value="06-0000-0000" /></div>
          <div><label>メール</label><input id="email" value="info@example.com" /></div>
          <div style="grid-column: 1 / -1;"><label>住所</label><input id="companyAddress" value="大阪府大阪市中央区〇〇 1-2-3" /></div>
        </div>
      </div>

      <div class="card">
        <h2>電子印鑑</h2>
        <div class="seal-editor-box">
          <div>
            <label>印鑑画像を登録</label>
            <input id="sealInput" type="file" accept="image/*" />
            <div class="toolbar">
              <button class="light" onclick="toggleSeal()" type="button" id="sealToggleBtn">押印する</button>
              <button class="secondary" onclick="saveSeal()" type="button">印鑑を保存</button>
              <button class="danger" onclick="clearSeal()" type="button">印鑑削除</button>
            </div>
            <p class="small-muted">透過PNG推奨。登録画像はこのブラウザ内に保存されます。</p>
          </div>
          <div>
            <label>登録印鑑</label>
            <div class="seal-sample" id="sealSample">未登録</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>明細</h2>
        <div class="table-wrap">
          <table class="editor-table">
            <thead>
              <tr>
                <th>工種</th>
                <th>工事項目</th>
                <th>工事詳細</th>
                <th>備考</th>
                <th>数量</th>
                <th>単位</th>
                <th>単価</th>
                <th>金額</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="itemsBody"></tbody>
          </table>
        </div>
        <div class="toolbar">
          <button onclick="addItem()">＋ 空行追加</button>
          <button class="light" onclick="addPreset('塗装工事','外壁塗装',1,'式')">塗装</button>
          <button class="light" onclick="addPreset('シーリング工事','シーリング打替',1,'式')">シーリング</button>
          <button class="light" onclick="addPreset('足場工事','仮設足場',1,'式')">足場</button>
          <button class="light" onclick="addPreset('防水工事','屋上防水',1,'式')">防水</button>
          <button class="light" onclick="addPreset('屋根工事','屋根補修',1,'式')">屋根</button>
          <button class="light" onclick="addPreset('内装工事','クロス貼替',1,'式')">内装</button>
          <button class="light" onclick="addPreset('床工事','フロア施工',1,'式')">床</button>
          <button class="light" onclick="addPreset('解体工事','内装解体',1,'式')">解体</button>
          <button class="light" onclick="addPreset('電気工事','照明交換',1,'式')">電気</button>
          <button class="light" onclick="addPreset('設備工事','給排水設備',1,'式')">設備</button>
          <button class="light" onclick="addPreset('空調工事','エアコン設置',1,'式')">空調</button>
          <button class="light" onclick="addPreset('外構工事','外構工事',1,'式')">外構</button>
          <button class="light" onclick="addPreset('左官工事','モルタル補修',1,'式')">左官</button>
          <button class="light" onclick="addPreset('大工工事','木下地工事',1,'式')">大工</button>
          <button class="light" onclick="addPreset('清掃工事','竣工清掃',1,'式')">清掃</button>
          <button class="light" onclick="addPreset('付帯工事','諸経費',1,'式')">諸経費</button>
        </div>
      </div>

      <div class="card">
        <h2>税・値引き</h2>
        <div class="grid three">
          <div>
            <label>消費税率</label>
            <select id="taxRate">
              <option value="0.10">10%</option>
              <option value="0.08">8%</option>
              <option value="0">非課税</option>
            </select>
          </div>
          <div><label>値引き額</label><input id="discount" type="number" value="0" min="0" /></div>
          <div>
            <label>端数処理</label>
            <select id="roundMode">
              <option value="round">四捨五入</option>
              <option value="floor">切り捨て</option>
              <option value="ceil">切り上げ</option>
            </select>
          </div>
        </div>
        <div class="summary">
          <div class="sum-row"><span>小計</span><strong id="sumSubtotal">¥0</strong></div>
          <div class="sum-row"><span>値引き</span><strong id="sumDiscount">¥0</strong></div>
          <div class="sum-row"><span>消費税</span><strong id="sumTax">¥0</strong></div>
          <div class="sum-row total"><span>合計</span><strong id="sumTotal">¥0</strong></div>
        </div>
      </div>

      <div class="card">
        <h2>備考</h2>
        <textarea id="notes">・上記金額には材料費・施工費を含みます。
・現地状況により内容が変更となる場合がございます。
・追加工事が発生する場合は、事前にご相談いたします。</textarea>
      </div>
    </section>

    <section id="previewScreen" class="screen">
      <div class="top-actions no-print">
        <div>
          <button class="secondary" onclick="showInput()">入力画面へ戻る</button>
          <button class="success" onclick="window.print()">印刷 / PDF保存</button>
        </div>
        <div class="small-muted">PDF保存時は印刷画面の「ヘッダーとフッター」をOFFにするとURLが消えます。</div>
      </div>
      <div class="preview-shell" id="previewRoot"></div>
    </section>
  </main>

  <script>
    const fields = [
      'estimateNo','issueDate','clientName','projectName','siteAddress','validUntil','workPeriod','paymentTerms',
      'companyName','staffName','tel','email','companyAddress','taxRate','discount','roundMode','notes'
    ];

    const STORAGE_KEY = 'constructionEstimateData';
    const HISTORY_KEY = 'constructionEstimateHistory';
    const HISTORY_LIMIT = 10;

    function blankItem() {
      return { category: '', name: '', detail: '', remark: '', qty: '', unit: '', price: '' };
    }

    let items = [blankItem()];

    let sealImage = localStorage.getItem('constructionEstimateSeal') || '';
    let sealEnabled = localStorage.getItem('constructionEstimateSealEnabled') === 'true';

    function yen(num) {
      return new Intl.NumberFormat('ja-JP', { style: 'currency', currency: 'JPY' }).format(Number(num || 0));
    }

    function today() {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    function formatDate(value) {
      if (!value) return '';
      const [y,m,d] = value.split('-');
      return `${y}年${Number(m)}月${Number(d)}日`;
    }

    function escapeHtml(str) {
      return String(str ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function roundByMode(value) {
      const mode = document.getElementById('roundMode').value;
      if (mode === 'floor') return Math.floor(value);
      if (mode === 'ceil') return Math.ceil(value);
      return Math.round(value);
    }

    function calc() {
      const subtotal = items.reduce((sum, item) => sum + Number(item.qty || 0) * Number(item.price || 0), 0);
      const discount = Math.min(Number(document.getElementById('discount').value || 0), subtotal);
      const taxRate = Number(document.getElementById('taxRate').value || 0);
      const tax = roundByMode((subtotal - discount) * taxRate);
      const total = subtotal - discount + tax;
      return { subtotal, discount, tax, total };
    }

    function getValue(id) {
      return document.getElementById(id)?.value || '';
    }

    function getCategoryGroups() {
      const groups = new Map();
      items.forEach(item => {
        const category = (item.category || 'その他工事').trim() || 'その他工事';
        if (!groups.has(category)) groups.set(category, { total: 0, items: [] });
        const amount = Number(item.qty || 0) * Number(item.price || 0);
        groups.get(category).total += amount;
        groups.get(category).items.push(item);
      });
      return groups;
    }

    function renderItems() {
      const body = document.getElementById('itemsBody');
      body.innerHTML = '';
      items.forEach((item, index) => {
        const amount = Number(item.qty || 0) * Number(item.price || 0);
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><input value="${escapeHtml(item.category)}" oninput="updateItem(${index}, 'category', this.value)" placeholder="例：塗装工事" /></td>
          <td><input value="${escapeHtml(item.name)}" oninput="updateItem(${index}, 'name', this.value)" placeholder="例：外壁塗装" /></td>
          <td><textarea placeholder="工事内容を入力" oninput="updateItem(${index}, 'detail', this.value)">${escapeHtml(item.detail || '')}</textarea></td>
          <td><textarea placeholder="備考・注意事項など" oninput="updateItem(${index}, 'remark', this.value)">${escapeHtml(item.remark || '')}</textarea></td>
          <td><input type="number" value="${item.qty}" min="0" step="0.1" oninput="updateItem(${index}, 'qty', this.value)" /></td>
          <td><input value="${escapeHtml(item.unit)}" oninput="updateItem(${index}, 'unit', this.value)" /></td>
          <td><input type="number" value="${item.price}" min="0" oninput="updateItem(${index}, 'price', this.value)" placeholder="0" /></td>
          <td data-amount-index="${index}">${yen(amount)}</td>
          <td><button class="danger" onclick="removeItem(${index})">削除</button></td>
        `;
        body.appendChild(tr);
      });
      renderSummary();
    }

    function renderSummary() {
      const { subtotal, discount, tax, total } = calc();
      document.getElementById('sumSubtotal').textContent = yen(subtotal);
      document.getElementById('sumDiscount').textContent = '-' + yen(discount);
      document.getElementById('sumTax').textContent = yen(tax);
      document.getElementById('sumTotal').textContent = yen(total);
    }

    function renderSeal() {
      const sample = document.getElementById('sealSample');
      const toggleBtn = document.getElementById('sealToggleBtn');
      if (sealImage) {
        sample.innerHTML = `<img src="${sealImage}" alt="登録印鑑" />`;
      } else {
        sample.textContent = '未登録';
      }
      toggleBtn.textContent = sealEnabled ? '押印を外す' : '押印する';
    }

    function renderPreview() {
      const root = document.getElementById('previewRoot');
      const { subtotal, discount, tax, total } = calc();
      const groups = getCategoryGroups();

      const sealTag = sealImage && sealEnabled
        ? `<img src="${sealImage}" class="seal-on-preview" alt="電子印鑑" />`
        : '';

      const coverRows = Array.from(groups.entries()).map(([category, group]) => `
        <tr>
          <td>${escapeHtml(category)}</td>
          <td class="right">${yen(group.total)}</td>
        </tr>
      `).join('');

      const detailPages = Array.from(groups.entries()).map(([category, group]) => `
        <div class="preview-page">
          <div class="page-heading">
            <span>${escapeHtml(category)} 明細</span>
            <span class="category-total">小計 ${yen(group.total)}</span>
          </div>
          <table>
            <thead>
              <tr>
                <th style="width:18%;">工事項目</th>
                <th style="width:28%;">工事詳細</th>
                <th style="width:20%;">備考</th>
                <th class="center" style="width:8%;">数量</th>
                <th class="center" style="width:8%;">単位</th>
                <th class="right" style="width:9%;">単価</th>
                <th class="right" style="width:9%;">金額</th>
              </tr>
            </thead>
            <tbody>
              ${group.items.map(item => {
                const amount = Number(item.qty || 0) * Number(item.price || 0);
                return `
                  <tr>
                    <td>${escapeHtml(item.name)}</td>
                    <td class="preview-detail">${escapeHtml(item.detail || '')}</td>
                    <td class="preview-detail">${escapeHtml(item.remark || '')}</td>
                    <td class="center">${escapeHtml(item.qty)}</td>
                    <td class="center">${escapeHtml(item.unit)}</td>
                    <td class="right">${yen(item.price)}</td>
                    <td class="right">${yen(amount)}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      `).join('');

      root.innerHTML = `
        <div class="preview-page">
          <div class="estimate-title">御見積書</div>
          <div class="preview-top">
            <div>
              <div class="client-name">${escapeHtml(getValue('clientName'))}</div>
              <p>下記の通り御見積申し上げます。</p>
            </div>
            <div class="company-box">
              <div>見積番号：${escapeHtml(getValue('estimateNo'))}</div>
              <div>作成日：${escapeHtml(formatDate(getValue('issueDate')))}</div>
              <br />
              <strong>${escapeHtml(getValue('companyName'))}</strong><br />
              ${escapeHtml(getValue('companyAddress'))}<br />
              TEL：${escapeHtml(getValue('tel'))}<br />
              Mail：${escapeHtml(getValue('email'))}<br />
              担当：${escapeHtml(getValue('staffName'))}
              ${sealTag}
            </div>
          </div>

          <div class="price-box">
            <span>御見積金額</span>
            <span>${yen(total)}</span>
          </div>

          <div class="preview-meta">
            <div>件名：<strong>${escapeHtml(getValue('projectName'))}</strong></div>
            <div>工事場所：<strong>${escapeHtml(getValue('siteAddress'))}</strong></div>
            <div>有効期限：<strong>${escapeHtml(getValue('validUntil'))}</strong></div>
            <div>工期：<strong>${escapeHtml(getValue('workPeriod'))}</strong></div>
            <div>支払条件：<strong>${escapeHtml(getValue('paymentTerms'))}</strong></div>
          </div>

          <div class="cover-label">工種別内訳</div>
          <table>
            <thead>
              <tr><th>工種</th><th class="right">小計</th></tr>
            </thead>
            <tbody>${coverRows}</tbody>
          </table>

          <table style="width: 42%; margin-left: auto; margin-top: 14px;">
            <tbody>
              <tr><th>小計</th><td class="right">${yen(subtotal)}</td></tr>
              <tr><th>値引き</th><td class="right">-${yen(discount)}</td></tr>
              <tr><th>消費税</th><td class="right">${yen(tax)}</td></tr>
              <tr><th>合計</th><td class="right" style="font-weight:900;">${yen(total)}</td></tr>
            </tbody>
          </table>

          <div class="note-box">${escapeHtml(getValue('notes'))}</div>
        </div>
        ${detailPages}
      `;
    }

    function updateItem(index, key, value) {
      items[index][key] = value;

      // 入力中に表全体を再描画すると、1文字ごとにカーソルが飛ぶため禁止。
      // 数量・単価の変更時だけ、その行の金額表示と合計欄を更新する。
      if (key === 'qty' || key === 'price') {
        const amountCell = document.querySelector(`[data-amount-index="${index}"]`);
        if (amountCell) {
          const item = items[index];
          const amount = Number(item.qty || 0) * Number(item.price || 0);
          amountCell.textContent = yen(amount);
        }
      }

      renderSummary();
    }

      renderItems();
    }

    function addItem() {
      items.push({ category: 'その他工事', name: '', detail: '', remark: '', qty: 1, unit: '式', price: '' });
      renderItems();
    }

    function addPreset(category, name, qty, unit) {
      items.push({ category, name, detail: '', remark: '', qty, unit, price: '' });
      renderItems();
    }

    function removeItem(index) {
      items.splice(index, 1);
      renderItems();
    }

    function showPreview() {
      renderPreview();
      document.getElementById('inputScreen').classList.remove('active');
      document.getElementById('previewScreen').classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showInput() {
      document.getElementById('previewScreen').classList.remove('active');
      document.getElementById('inputScreen').classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function toggleSeal() {
      if (!sealImage) {
        alert('先に印鑑画像を登録してください');
        return;
      }
      sealEnabled = !sealEnabled;
      localStorage.setItem('constructionEstimateSealEnabled', String(sealEnabled));
      renderSeal();
    }

    function saveSeal() {
      if (!sealImage) {
        alert('保存する印鑑画像がありません');
        return;
      }
      localStorage.setItem('constructionEstimateSeal', sealImage);
      localStorage.setItem('constructionEstimateSealEnabled', String(sealEnabled));
      alert('印鑑を保存しました');
    }

    function clearSeal() {
      if (!confirm('登録した印鑑を削除しますか？')) return;
      sealImage = '';
      sealEnabled = false;
      localStorage.removeItem('constructionEstimateSeal');
      localStorage.removeItem('constructionEstimateSealEnabled');
      document.getElementById('sealInput').value = '';
      renderSeal();
    }

    function makeSnapshot() {
      const totals = calc();
      const snapshot = {
        version: 2,
        savedAt: new Date().toISOString(),
        fields: {},
        items: items.map(item => ({ ...blankItem(), ...item })),
        sealEnabled,
        totals
      };
      fields.forEach(id => snapshot.fields[id] = getValue(id));
      return snapshot;
    }

    function applySnapshot(data) {
      if (!data || typeof data !== 'object') throw new Error('invalid data');
      Object.entries(data.fields || {}).forEach(([id, value]) => {
        if (document.getElementById(id)) document.getElementById(id).value = value;
      });
      items = (Array.isArray(data.items) && data.items.length ? data.items : [blankItem()])
        .map(item => ({ ...blankItem(), ...item }));
      if (typeof data.sealEnabled === 'boolean') sealEnabled = data.sealEnabled;
      localStorage.setItem('constructionEstimateSealEnabled', String(sealEnabled));
      renderItems();
      renderSeal();
      renderHistory();
    }

    function getHistory() {
      try {
        return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
      } catch {
        return [];
      }
    }

    function setHistory(history) {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(0, HISTORY_LIMIT)));
      renderHistory();
    }

    function addToHistory(snapshot) {
      const history = getHistory();
      history.unshift(snapshot);
      setHistory(history.slice(0, HISTORY_LIMIT));
    }

    function saveData() {
      const data = makeSnapshot();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      localStorage.setItem('constructionEstimateSealEnabled', String(sealEnabled));
      addToHistory(data);
      alert('保存しました。履歴にも追加しました');
    }

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return alert('保存データがありません');
      try {
        applySnapshot(JSON.parse(raw));
      } catch {
        alert('保存データの読込に失敗しました');
      }
    }

    function restoreHistory(index) {
      const history = getHistory();
      const data = history[index];
      if (!data) return alert('履歴データが見つかりません');
      if (!confirm('この履歴を復元しますか？ 現在の入力内容は上書きされます。')) return;
      applySnapshot(data);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      alert('履歴を復元しました。修正して再保存できます');
    }

    function deleteHistory(index) {
      if (!confirm('この履歴を削除しますか？')) return;
      const history = getHistory();
      history.splice(index, 1);
      setHistory(history);
    }

    function renderHistory() {
      const box = document.getElementById('historyList');
      if (!box) return;
      const history = getHistory();
      if (!history.length) {
        box.innerHTML = '<div class="small-muted">保存履歴はまだありません。</div>';
        return;
      }
      box.innerHTML = history.map((data, index) => {
        const f = data.fields || {};
        const saved = data.savedAt ? new Date(data.savedAt).toLocaleString('ja-JP') : '日時不明';
        const title = `${escapeHtml(f.estimateNo || '見積番号なし')} / ${escapeHtml(f.clientName || 'お客様名なし')}`;
        const meta = `${escapeHtml(f.projectName || '件名なし')}　${saved}　合計 ${yen(data.totals?.total || 0)}`;
        return `
          <div class="history-item">
            <div>
              <div class="history-title">${title}</div>
              <div class="history-meta">${meta}</div>
            </div>
            <div class="history-actions">
              <button class="light" onclick="restoreHistory(${index})">復元</button>
              <button class="danger" onclick="deleteHistory(${index})">削除</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function safeFileName(text) {
      return String(text || '')
        .replace(/[\\/:*?"<>|]/g, '-')
        .replace(/\s+/g, '')
        .slice(0, 40) || 'estimate';
    }

    function downloadJson() {
      const data = makeSnapshot();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const no = safeFileName(data.fields.estimateNo || '見積書');
      const client = safeFileName(data.fields.clientName || 'お客様');
      a.href = url;
      a.download = `${no}_${client}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function importJsonFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          applySnapshot(data);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
          addToHistory({ ...data, savedAt: new Date().toISOString() });
          alert('JSONから見積書を復元しました');
        } catch {
          alert('JSONファイルの読込に失敗しました');
        } finally {
          document.getElementById('jsonImportInput').value = '';
        }
      };
      reader.readAsText(file);
    }

    function resetData() {
      if (!confirm('入力内容を初期化しますか？ 印鑑登録は残ります。')) return;
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    }

    document.getElementById('issueDate').value = today();
    fields.forEach(id => {
      const el = document.getElementById(id);
      el.addEventListener('input', renderSummary);
      el.addEventListener('change', renderSummary);
    });

    document.getElementById('jsonImportInput').addEventListener('change', (event) => {
      importJsonFile(event.target.files?.[0]);
    });

    document.getElementById('sealInput').addEventListener('change', (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        sealImage = reader.result;
        sealEnabled = true;
        localStorage.setItem('constructionEstimateSeal', sealImage);
        localStorage.setItem('constructionEstimateSealEnabled', 'true');
        renderSeal();
      };
      reader.readAsDataURL(file);
    });

    renderItems();
    renderSeal();
    renderHistory();
  </script>
</body>
</html>
